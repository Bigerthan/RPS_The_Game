name: Build RPS Game

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # This hides those annoying warnings

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install opencv-python mediapipe pygame numpy pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --noconsole --onefile \
          --collect-all mediapipe \
          --copy-metadata mediapipe \
          --hidden-import="mediapipe.python.solutions" \
          --hidden-import="mediapipe.python.solutions.hands" \
          --add-data "RPS_files;RPS_files" RPS_The_Game.py
        else
          pyinstaller --noconsole --onefile \
          --collect-all mediapipe \
          --copy-metadata mediapipe \
          --hidden-import="mediapipe.python.solutions" \
          --hidden-import="mediapipe.python.solutions.hands" \
          --add-data "RPS_files:RPS_files" RPS_The_Game.py
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-Build
        path: dist/

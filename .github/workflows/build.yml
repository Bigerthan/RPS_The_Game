name: Build RPS Game (Multi-Platform)

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # Cache removed to prevent the "No file matched" error

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python mediapipe pygame numpy pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --noconsole --onefile --collect-all mediapipe --add-data "RPS_files;RPS_files" RPS_The_Game.py
        else
          pyinstaller --noconsole --onefile --collect-all mediapipe --add-data "RPS_files:RPS_files" RPS_The_Game.py
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-Game-Build
        path: dist/

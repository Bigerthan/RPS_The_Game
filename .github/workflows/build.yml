name: Build RPS Game (MediaPipe 0.10.9 Version)

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Specifically installing version 0.10.9 as per your requirement
        pip install opencv-python mediapipe==0.10.9 pygame numpy pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          # Windows build
          pyinstaller --noconsole --onefile \
          --icon="RPS_files/Images/Icons/Game_icon/Game_icon_1_255x255.ico" \
          --collect-all mediapipe \
          --copy-metadata mediapipe \
          --hidden-import="mediapipe.python.solutions" \
          --hidden-import="mediapipe.python.solutions.hands" \
          --hidden-import="mediapipe.python.solutions.drawing_utils" \
          --add-data "RPS_files;RPS_files" \
          RPS_The_Game.py
        else
          # Mac/Linux build
          pyinstaller --noconsole --onefile \
          --icon="RPS_files/Images/Icons/Game_icon/Game_icon_1_255x255.ico" \
          --collect-all mediapipe \
          --copy-metadata mediapipe \
          --hidden-import="mediapipe.python.solutions" \
          --hidden-import="mediapipe.python.solutions.hands" \
          --hidden-import="mediapipe.python.solutions.drawing_utils" \
          --add-data "RPS_files:RPS_files" \
          RPS_The_Game.py
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-Game-Build
        path: dist/
